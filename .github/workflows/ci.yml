name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend (zero-infra tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install minimal deps
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check app || true
      - name: Import check
        run: python -c "import app.main; print('import ok')"
      - name: Seed dev database
        run: python -m scripts.dev_bootstrap
      - name: Correlation integration test
        run: python -m tests.integration.test_correlation
      - name: Investigation integration test
        run: python -m tests.integration.test_investigation

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run type-check
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
